name: Build & Release

env:
  BUILD_EXE: false  # Set to true to enable Nuitka exe build + upload

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --group build

      - name: Run test suite with coverage
        run: uv run pytest --cov=patent_system --cov-report=xml --cov-report=json:coverage.json -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Extract coverage percentage
        id: coverage
        shell: bash
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COVERAGE}%"

      - name: Update coverage badge via Gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: b90471b021c2812e72f3ff038d22508d
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 0
          maxColorRange: 100

  release:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --group build

      - name: Install python-semantic-release
        run: uv pip install python-semantic-release

      - name: Get version before semantic-release
        id: before
        shell: bash
        run: |
          BEFORE=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "Version before: $BEFORE"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Get version after semantic-release
        id: after
        shell: bash
        run: |
          AFTER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          if [ "$AFTER" != "${{ steps.before.outputs.version }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "New version: $AFTER"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new version (still $AFTER)"
          fi

      - name: Cache Nuitka compilation cache
        if: env.BUILD_EXE == 'true' && steps.after.outputs.released == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/Nuitka
          key: nuitka-cache-${{ runner.os }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            nuitka-cache-${{ runner.os }}-

      - name: Build executable
        if: env.BUILD_EXE == 'true' && steps.after.outputs.released == 'true'
        run: uv run python build.py

      - name: Run smoke test
        if: env.BUILD_EXE == 'true' && steps.after.outputs.released == 'true'
        run: uv run pytest tests/integration/test_exe_smoke.py -q

      - name: Upload exe to GitHub Release
        if: env.BUILD_EXE == 'true' && steps.after.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.after.outputs.version }}
          files: dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
